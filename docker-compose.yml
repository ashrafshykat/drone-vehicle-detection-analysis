services:
  postgres:
    image: postgres:16-alpine
    container_name: ants-postgres
    environment:
      POSTGRES_DB: ants_traffic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: ants-backend
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ants_traffic
    volumes:
      - ./backend/data:/app/data
      - ./models:/models
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:8000
    container_name: ants-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
